kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: apache
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/LondheShubham153/argocd-demos.git
    targetRevision: main
    path: cli_approach/apache
  destination:
    server: <cluster ip>
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
