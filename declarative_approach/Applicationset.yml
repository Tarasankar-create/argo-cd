kind: ApplicationSet
apiVersion: argoproj.io/v1alpha1
metadata:
  name: root-app
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - app: apache
        path: cli_approach/apache
      - app: nginx
        path: ui_approach/nginx
      - app: chai-app
        path: applicationsets/chai-app
  template:
    metadata:
      name: '{{app}}-list'
    spec:
      project: default
      source:
        repoURL: https://github.com/Tarasankar-create/argocd-demos.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
